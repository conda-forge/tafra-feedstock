{% set name = "tafra" %}
{% set version = "2.1.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 7c0ef143b4185d148853e57d304b12c5a8743da29dfe50b20a966cf39a84e73d

build:
  number: 0
  skip: true  # [py<39]

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}      # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
  host:
    - python
    - pip
    - setuptools >=64
    - numpy >=2.1
  run:
    - python
    - numpy >=2.1
    - typing_extensions

test:
  source_files:
    - test
  imports:
    - tafra
    - tafra._accel
  commands:
    - pip check
    - python -c "from tafra._accel import groupby_sum; print('C extension OK')"
    - pytest --cov=tafra --cov-report=term-missing --hypothesis-show-statistics -v test
  requires:
    - pip
    - pytest
    - hypothesis
    - pytest-cov
    - pandas

about:
  home: https://github.com/petbox-dev/tafra
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: "Tafra: innards of a dataframe"
  description: |
    A minimalist Python dataframe library — a lightweight alternative to
    pandas backed by numpy arrays. Provides SQL-style group-by, transform,
    and join operations with optional C acceleration for single-pass
    aggregation and hash-based equi-joins.
  doc_url: https://tafra.readthedocs.io/
  dev_url: https://github.com/petbox-dev/tafra

extra:
  recipe-maintainers:
    - dsfulf
